        title: "Strength A · Push + Squat"
        kind: strength
        duration: "≈ 50 MIN"
        note: "Groove the lifts under honest, submaximal load. Leave 2-3 reps in reserve. Target RPE 6. Set the safety arms."
        prescriptions:
          A:
            - "Warmup: 8 min easy cardio, then empty-bar and ramp-up sets"
            - "Barbell back squat: 3 × 8"
            - "Barbell overhead press: 3 × 8"
            - "Dumbbell bench press: 3 × 10"
            - "Ab wheel, short range: 3 × 8"
            - "Cooldown: 3 min easy spin or walk"
          B:
            - "Warmup: 8 min easy cardio, then empty-bar and ramp-up sets"
            - "Barbell back squat: 3 × 6"
            - "Barbell overhead press: 3 × 6"
            - "Barbell bench press: 3 × 6"
            - "Ab wheel: 3 × 8"
            - "Cooldown: 3 min easy spin or walk"
      - day: 2
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "45-50 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2. Find the machine pace that holds the talk test."
        prescriptions:
          A:
            - "45 min Zone 2 on the machine, or brisk walk / easy jog"
            - "Hold the pace that keeps full-sentence conversation"
            - "Nasal breathing if able; slow until it returns"
          B:
