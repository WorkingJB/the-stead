            - "Strict pull-up, or assisted at minimum help: 3 × 5-6"
            - "Dumbbell Romanian deadlift: 3 × 10"
            - "Dumbbell hip thrust: 3 × 12"
            - "Cable Pallof press: 3 × 10 each side"
            - "Cooldown: 3 min easy walking"
      - day: 4
