# The Stead - C1 (The Membership) - weekly prescriptions
#
# This is the tabular programming data. Prose (week intros, coaching voice,
# movement descriptions) lives in content/c1/. Each week here drives TWO
# rendered pages: the portrait week-summary and the landscape week-tracker.
#
# Schema (identical to the tier-N progressions):
#   weeks[].week              week number 1-12
#   weeks[].days[].day        day number 1-5 (Day 6 mobility / Day 7 rest are program-wide)
#   weeks[].days[].title      session title as printed
#   weeks[].days[].kind       strength | cardio | tempo | intervals | long
#   weeks[].days[].duration   duration label as printed
#   weeks[].days[].note       the per-day NOTE line (coaching cue tied to the prescription)
#   weeks[].days[].prescriptions.A / .B   ordered "movement: sets x reps" lines per Path
#
# C1 equipment: a basic commercial gym (selectorized machines, full dumbbell
# range, cable stack, assisted pull-up station, cardio floor). Strength is
# machine, dumbbell, and cable based; the Day 5 keystone is a loaded ruck done
# outdoors or on a steep treadmill incline.
#
# Style: colon between movement and prescription; "x" rendered as the multiplication sign.
# No em dashes anywhere (see shared/style-rules.md).

tier: C1
title: The Membership
paths: [A, B]

# Program-wide footer printed on every week-summary page:
optional_days: "Day 6 · 15-20 min mobility, optional · Day 7 · rest"

blocks:
  - number: 1
    name: The Engine
    weeks: [1, 2, 3, 4]
  - number: 2
    name: The Build
    weeks: [5, 6, 7, 8]
  - number: 3
    name: Integration
    weeks: [9, 10, 11, 12]

weeks:
  - week: 1
    days:
      - day: 1
        title: "Strength A · Push + Squat"
        kind: strength
        duration: "≈ 45 MIN"
        note: "Learn the machines and set the seats. Leave 2-3 reps in reserve on every set. Target RPE 6. Sub goblet squats for the leg press to train the free-standing pattern any time."
        prescriptions:
          A:
            - "Warmup: 5 min easy cardio, joint circles, band pull-aparts"
            - "Leg press: 3 × 12"
            - "Machine shoulder press: 3 × 10-12"
            - "Machine chest press: 3 × 10-12"
            - "Plank: 3 × 30 sec"
            - "Cooldown: 3 min easy walking"
          B:
            - "Warmup: 5 min easy cardio, joint circles, band pull-aparts"
            - "Leg press: 3 × 10"
            - "Dumbbell shoulder press: 3 × 8-10"
            - "Dumbbell bench press: 3 × 8-10"
            - "Plank: 3 × 45 sec"
            - "Cooldown: 3 min easy walking"
      - day: 2
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "35-40 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2."
        prescriptions:
          A:
            - "35 min Zone 2 on a treadmill, bike, or elliptical"
            - "Conversational pace; nasal breathing the whole session"
            - "Trust the talk test over the machine's heart-rate readout"
          B:
            - "40 min Zone 2 on a machine, or easy jog"
            - "Nasal breathing if able; talk test otherwise"
            - "If you cannot speak in full sentences, slow down"
      - day: 3
        title: "Strength B · Pull + Hinge"
