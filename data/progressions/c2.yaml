        title: "Strength A · Push + Squat"
        kind: strength
        duration: "≈ 50 MIN"
        note: "Groove the lifts under honest weight. Leave 2-3 reps in reserve on every set. Target RPE 6."
        prescriptions:
          A:
            - "Warmup: 5 min easy row, mobility, empty-bar work"
            - "Barbell back squat: 3 × 8"
            - "Barbell strict press: 3 × 6"
            - "Bench press: 3 × 8"
            - "Ab wheel: 3 × 8"
            - "Cooldown: 3 min easy bike"
          B:
            - "Warmup: 5 min easy row, mobility, empty-bar work"
            - "Barbell back squat: 3 × 6"
            - "Barbell push press: 3 × 5"
            - "Weighted dip: 3 × 6"
            - "Ab wheel: 3 × 10"
            - "Cooldown: 3 min easy bike"
      - day: 2
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "40-45 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2. Yes, it will feel too easy."
        prescriptions:
          A:
            - "40 min Zone 2 on a rower, bike, or easy run"
            - "Conversational pace; nasal breathing the whole session"
            - "Headphones on; let the class chase the leaderboard without you"
          B:
            - "45 min Zone 2 on a rower or bike, or easy run"
            - "Nasal breathing if able; talk test otherwise"
            - "If you cannot speak in full sentences, slow down"
      - day: 3
        title: "Strength B · Pull + Hinge"
