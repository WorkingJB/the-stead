# The Stead - C2 (The Strength Hall) - weekly prescriptions
#
# This is the tabular programming data. Prose (week intros, coaching voice,
# movement descriptions) lives in content/c2/. Each week here drives TWO
# rendered pages: the portrait week-summary and the landscape week-tracker.
#
# Schema (identical to the tier-N progressions):
#   weeks[].week              week number 1-12
#   weeks[].days[].day        day number 1-5 (Day 6 mobility / Day 7 rest are program-wide)
#   weeks[].days[].title      session title as printed
#   weeks[].days[].kind       strength | cardio | tempo | intervals | long
#   weeks[].days[].duration   duration label as printed
#   weeks[].days[].note       the per-day NOTE line (coaching cue tied to the prescription)
#   weeks[].days[].prescriptions.A / .B   ordered "movement: sets x reps" lines per Path
#
# C2 equipment: a serious strength gym or CrossFit affiliate (full barbells and
# platforms, racks and a rig, GHD and sleds, rowers and air bikes, complete bell
# and dumbbell range, rings and dip station). Strength is barbell and olympic
# based; the Day 5 keystone is a loaded ruck, done outdoors or on a steep incline.
#
# Style: colon between movement and prescription; "x" rendered as the multiplication sign.
# No em dashes anywhere (see shared/style-rules.md).

tier: C2
title: The Strength Hall
paths: [A, B]

# Program-wide footer printed on every week-summary page:
optional_days: "Day 6 · 15-20 min mobility, optional · Day 7 · rest"

blocks:
  - number: 1
    name: The Engine
    weeks: [1, 2, 3, 4]
  - number: 2
    name: The Build
    weeks: [5, 6, 7, 8]
  - number: 3
    name: Integration
    weeks: [9, 10, 11, 12]

weeks:
