# The Stead - Tier 2 (The Expanded Home) - weekly prescriptions
#
# This is the tabular programming data. Prose (week intros, coaching voice,
# movement descriptions) lives in content/tier-2/. Each week here drives TWO
# rendered pages: the portrait week-summary and the landscape week-tracker.
#
# Schema (identical to tier-0.yaml / tier-1.yaml):
#   weeks[].week              week number 1-12
#   weeks[].days[].day        day number 1-5 (Day 6 mobility / Day 7 rest are program-wide)
#   weeks[].days[].title      session title as printed
#   weeks[].days[].kind       strength | cardio | tempo | intervals | long
#   weeks[].days[].duration   duration label as printed
#   weeks[].days[].note       the per-day NOTE line (coaching cue tied to the prescription)
#   weeks[].days[].prescriptions.A / .B   ordered "movement: sets x reps" lines per Path
#
# Tier 2 equipment: two matched kettlebells, gymnastics rings, a sandbag, a jump
# rope, a plyo box (plus the Tier 1 kit: doorway bar, weight vest, real shoes).
# Strength is double-bell, ring, and sandbag based; the Day 5 keystone is a
# loaded ruck.
#
# Style: colon between movement and prescription; "x" rendered as the multiplication sign.
# No em dashes anywhere (see shared/style-rules.md).

tier: 2
title: The Expanded Home
paths: [A, B]

# Program-wide footer printed on every week-summary page:
optional_days: "Day 6 · 15-20 min mobility, optional · Day 7 · rest"

blocks:
  - number: 1
    name: The Engine
    weeks: [1, 2, 3, 4]
  - number: 2
    name: The Build
    weeks: [5, 6, 7, 8]
  - number: 3
    name: Integration
    weeks: [9, 10, 11, 12]

weeks:
  - week: 1
    days:
      - day: 1
        title: "Strength A · Push + Squat"
        kind: strength
        duration: "≈ 45 MIN"
        note: "Make the double clean to the rack automatic before chasing reps. Leave 2-3 reps in reserve on every set. Target RPE 6."
        prescriptions:
          A:
            - "Warmup: 5 min easy movement, joint circles, double-clean practice"
            - "KB goblet squat: 3 × 10-12"
            - "Double KB strict press: 3 × 6-8"
            - "Ring pushup: 3 × 8-10"
            - "Plank: 3 × 30 sec"
            - "Cooldown: 3 min walking, slow breath"
          B:
            - "Warmup: 5 min easy movement, joint circles, double-clean practice"
            - "Double KB front squat: 3 × 8-10"
            - "Double KB push press: 3 × 6-8"
            - "Ring dip: 3 × 6-8"
            - "Ring fallout: 3 × 6-8"
            - "Cooldown: 3 min walking, slow breath"
      - day: 2
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "40-45 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2."
        prescriptions:
          A:
            - "40 min brisk walking or easy jog, flat to gently rolling terrain"
            - "Nasal breathing the entire session"
            - "If your breath breaks the nose seal, slow until it returns"
          B:
            - "45 min easy jog, conversational pace"
            - "Nasal breathing if able; talk test otherwise"
            - "If you cannot speak in full sentences, slow down"
      - day: 3
        title: "Strength B · Pull + Hinge"
        kind: strength
        duration: "≈ 45 MIN"
        note: "The rings will feel shaky at first; that settles fast. Full range; controlled tempo. Target RPE 6."
        prescriptions:
          A:
            - "Warmup: 5 min easy movement, scapular hangs"
            - "Strict pullup, or band-assisted: 3 × 4-6"
            - "KB swing, two-hand: 3 × 12-15"
            - "KB single-leg Romanian deadlift: 3 × 8 each side"
            - "Bird dog: 3 × 6 ea side"
            - "Cooldown: 3 min walking"
          B:
            - "Warmup: 5 min easy movement, scapular hangs"
            - "Weighted pullup (vest): 3 × 4-6"
            - "KB swing, single-arm: 3 × 10 each side"
            - "Sandbag clean: 3 × 6-8"
            - "Side plank: 3 × 30s each side"
            - "Cooldown: 3 min walking"
      - day: 4
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "40-45 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2."
