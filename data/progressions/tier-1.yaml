# The Stead - Tier 1 (The Standard Home) - weekly prescriptions
#
# This is the tabular programming data. Prose (week intros, coaching voice,
# movement descriptions) lives in content/tier-1/. Each week here drives TWO
# rendered pages: the portrait week-summary and the landscape week-tracker.
#
# Schema (identical to tier-0.yaml):
#   weeks[].week              week number 1-12
#   weeks[].days[].day        day number 1-5 (Day 6 mobility / Day 7 rest are program-wide)
#   weeks[].days[].title      session title as printed
#   weeks[].days[].kind       strength | cardio | tempo | intervals | long
#   weeks[].days[].duration   duration label as printed
#   weeks[].days[].note       the per-day NOTE line (coaching cue tied to the prescription)
#   weeks[].days[].prescriptions.A / .B   ordered "movement: sets x reps" lines per Path
#
# Tier 1 equipment: doorway pullup bar, one heavy kettlebell (16-20 kg Path A,
# 24 kg Path B), a weight vest (20-30 lb), real training shoes. Strength is
# kettlebell-based; the Day 5 keystone is a loaded ruck.
#
# Style: colon between movement and prescription; "x" rendered as the multiplication sign.
# No em dashes anywhere (see shared/style-rules.md).

tier: 1
title: The Standard Home
paths: [A, B]

# Program-wide footer printed on every week-summary page:
optional_days: "Day 6 · 15-20 min mobility, optional · Day 7 · rest"

blocks:
  - number: 1
    name: The Engine
    weeks: [1, 2, 3, 4]
  - number: 2
    name: The Build
    weeks: [5, 6, 7, 8]
  - number: 3
    name: Integration
    weeks: [9, 10, 11, 12]

weeks:
  - week: 1
    days:
      - day: 1
        title: "Strength A · Push + Squat"
        kind: strength
        duration: "≈ 40 MIN"
        note: "Learn the kettlebell patterns first. Leave 2-3 reps in reserve on every set. Target RPE 6. Stop the set if form breaks."
        prescriptions:
          A:
            - "Warmup: 5 min easy movement, joint circles, KB halos"
            - "KB goblet squat: 3 × 8-10"
            - "KB strict press, single arm: 3 × 6-8 each side"
            - "Pushup: 3 × 8-10"
            - "Plank: 3 × 25 sec"
            - "Cooldown: 3 min walking, slow breath"
          B:
            - "Warmup: 5 min easy movement, joint circles, KB halos"
            - "KB goblet squat: 3 × 10-12"
            - "KB push press, single arm: 3 × 6-8 each side"
            - "Pushup, feet elevated: 3 × 10-12"
            - "Plank: 3 × 45 sec"
            - "Cooldown: 3 min walking, slow breath"
      - day: 2
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "35-40 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2."
        prescriptions:
          A:
            - "35 min brisk walking or easy jog, flat to gently rolling terrain"
            - "Nasal breathing the entire session"
            - "If your breath breaks the nose seal, slow until it returns"
          B:
            - "40 min easy jog, conversational pace"
            - "Nasal breathing if able; talk test otherwise"
            - "If you cannot speak in full sentences, slow down"
      - day: 3
        title: "Strength B · Pull + Hinge"
        kind: strength
        duration: "≈ 40 MIN"
        note: "The doorway bar closes the pulling gap Tier 0 could only approximate. Full range; controlled tempo. Target RPE 6."
