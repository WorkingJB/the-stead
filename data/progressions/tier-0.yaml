# The Stead - Tier 0 (The Foundation) - weekly prescriptions
#
# This is the tabular programming data. Prose (week intros, coaching voice,
# movement descriptions) lives in content/tier-0/. Each week here drives TWO
# rendered pages: the portrait week-summary and the landscape week-tracker.
#
# Schema:
#   weeks[].week              week number 1-12
#   weeks[].days[].day        day number 1-5 (Day 6 mobility / Day 7 rest are program-wide)
#   weeks[].days[].title      session title as printed
#   weeks[].days[].kind       strength | cardio | tempo | intervals | long
#   weeks[].days[].duration   duration label as printed
#   weeks[].days[].note       the per-day NOTE line (coaching cue tied to the prescription)
#   weeks[].days[].prescriptions.A / .B   ordered "movement: sets x reps" lines per Path
#
# Style: colon between movement and prescription; "x" rendered as the multiplication sign.
# No em dashes anywhere (see shared/style-rules.md).

tier: 0
title: The Foundation
paths: [A, B]

# Program-wide footer printed on every week-summary page:
optional_days: "Day 6 · 15-20 min mobility, optional · Day 7 · rest"

blocks:
  - number: 1
    name: The Engine
    weeks: [1, 2, 3, 4]
  - number: 2
    name: The Build
    weeks: [5, 6, 7, 8]
  - number: 3
    name: Integration
    weeks: [9, 10, 11, 12]

weeks:
  - week: 1
    days:
      - day: 1
        title: "Strength A · Push + Squat"
        kind: strength
        duration: "≈ 35 MIN"
        note: "Leave 2-3 reps in reserve on every set. Target RPE 6. Stop the set if form breaks."
        prescriptions:
          A:
            - "Warmup: 5 min easy movement, joint circles"
            - "Wall or counter incline pushup: 3 × 8-10"
            - "Box squat to chair: 3 × 10-12"
            - "Plank: 3 × 20 sec"
            - "Dead bug: 3 × 6 each side"
            - "Cooldown: 3 min walking, slow breath"
          B:
            - "Warmup: 5 min easy movement, joint circles"
            - "Standard pushup: 3 × 8-12"
            - "Bodyweight squat: 3 × 12-15"
            - "Plank: 3 × 45 sec"
            - "Dead bug: 3 × 10 each side"
            - "Cooldown: 3 min walking, slow breath"
      - day: 2
        title: "Zone 2 Cardio"
        kind: cardio
        duration: "30-35 MIN"
        note: "Block 1 has no interval days. Every cardio session this week is Zone 2."
        prescriptions:
          A:
            - "30 min brisk walking, flat to gently rolling terrain"
            - "Nasal breathing the entire session"
            - "If your breath breaks the nose seal, slow until it returns"
          B:
            - "35 min easy jog or fast walk, conversational pace"
            - "Nasal breathing if able; talk test otherwise"
            - "If you cannot speak in full sentences, slow down"
      - day: 3
        title: "Strength B · Pull + Hinge"
        kind: strength
        duration: "≈ 35 MIN"
        note: "Pulling strength is the hardest gap to fill at Tier 0. Full range; controlled tempo. Target RPE 6."
        prescriptions:
          A:
            - "Warmup: 5 min easy movement"
            - "Doorway towel row, small lean: 3 × 6-8"
            - "Glute bridge: 3 × 12"
            - "Side plank: 3 × 15s each side"
            - "Bird dog: 3 × 6 ea side"
            - "Cooldown: 3 min walking"
          B:
            - "Warmup: 5 min easy movement"
            - "Inverted row (under table or broomstick on chairs): 3 × 8"
            - "Single-leg glute bridge: 3 × 8 each side"
            - "Side plank: 3 × 30s each side"
            - "Bird dog: 3 × 10 ea side"
            - "Cooldown: 3 min walking"
      - day: 4
        title: "Zone 2 Cardio"
        kind: cardio
