name: CI

on:
  push:
    branches: [main]
  pull_request:

# Public placeholder env: satisfies env validation and lets pages render.
# These are NOT the cloud project — real multi-device testing uses Vercel env.
env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci_only_0123456789
  NEXT_PUBLIC_SITE_URL: http://localhost:3000

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Content pipeline tests
        run: npm run content:test
        working-directory: .

      - name: Content pipeline build (no drift)
        run: |
          npm run content:build
          git diff --exit-code -- apps/web/lib/content/generated supabase/seed.sql \
            || (echo "::error::Generated content is stale. Run 'npm run content:build' and commit." && exit 1)
        working-directory: .

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke + accessibility (axe-core)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
